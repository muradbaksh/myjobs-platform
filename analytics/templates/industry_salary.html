{% extends 'base.html' %}

{% block content %}

<h2>Industry Salary Insights</h2>

<div class="table-responsive">

<table class="table table-hover table-bordered align-middle">

    <thead class="table-dark">
        <tr>
            <th>Industry</th>
            <th>Average Salary</th>
        </tr>
    </thead>

    <tbody>

    {% for row in data %}

    <tr>
        <td>{{ row.company__industry }}</td>
        <td>{{ row.avg_salary|floatformat:0 }}</td>
    </tr>

    {% endfor %}

    </tbody>

</table>

</div>

{% endblock %}
