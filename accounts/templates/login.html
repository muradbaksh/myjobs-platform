{% extends 'base.html' %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-header">
            <h4>Welcome Back</h4>
            <p>Sign in to your MYJOBS account</p>
        </div>

        <a href="{% url 'google_login' %}" class="btn-google">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg"
                 width="18" height="18" alt="Google">
            Continue with Google
        </a>

        <div class="auth-divider">
            <span>or sign in with email</span>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username"
                       class="form-control" placeholder="Enter your username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password"
                       class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-1">
                Sign In
            </button>

        </form>

        <div class="auth-footer mt-3">
            Don't have an account?
            <a href="{% url 'register' %}">Register</a>
        </div>

    </div>
</div>

<style>
.auth-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.auth-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    max-width: 420px;
}

.auth-header {
    text-align: center;
    margin-bottom: 24px;
}

.auth-header h4 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 4px;
}

.auth-header p {
    font-size: 13px;
    color: #94a3b8;
    margin: 0;
}

.btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 11px 0;
    border-radius: 9px;
    border: 1px solid #e2e8f0;
    background: #fff;
    color: #0f172a;
    font-size: 13.5px;
    font-weight: 600;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
}

.btn-google:hover {
    border-color: #bfdbfe;
    background: #f8fafc;
    color: #0f172a;
}

.auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: #94a3b8;
    font-size: 12px;
}

.auth-divider::before,
.auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e2e8f0;
}

.form-label {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
}

.form-control {
    font-size: 13.5px;
    border: 1px solid #e2e8f0;
    border-radius: 9px;
    padding: 10px 14px;
    color: #0f172a;
    transition: border-color 0.2s;
}

.form-control:focus {
    border-color: #bfdbfe;
    box-shadow: 0 0 0 3px rgba(191, 219, 254, 0.3);
}

.form-control::placeholder {
    color: #cbd5e1;
}

.auth-footer {
    text-align: center;
    font-size: 13px;
    color: #64748b;
}

.auth-footer a {
    color: #1d4ed8;
    font-weight: 600;
    text-decoration: none;
}

.auth-footer a:hover {
    text-decoration: underline;
}
</style>

{% endblock %}
