{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-header">
            <h4>Create Account</h4>
            <p>Join MYJOBS and start exploring</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <!-- {{ form|crispy }} -->
            {% for fm in form %}

                <div class="mb-3">
                    {{ fm.label_tag }}
                    {{ fm }}
                    <div class="text-danger small">
                        {{ fm.errors }}
                    </div>
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary w-100 mt-2">
                Register
            </button>
        </form>

        <div class="auth-footer m-3">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </div>

        <a href="{% url 'google_login' %}" class="btn-google">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg"
                 width="18" height="18" alt="Google">
            Continue with Google
        </a> 

    </div>
</div>

<style>
.auth-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.auth-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    max-width: 440px;
}

.auth-header {
    text-align: center;
    margin-bottom: 24px;
}

.auth-header h4 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 4px;
}

.auth-header p {
    font-size: 13px;
    color: #94a3b8;
    margin: 0;
}

.btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 11px 0;
    border-radius: 9px;
    border: 1px solid #e2e8f0;
    background: #fff;
    color: #0f172a;
    font-size: 13.5px;
    font-weight: 600;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
}

.btn-google:hover {
    border-color: #bfdbfe;
    background: #f8fafc;
    color: #0f172a;
}

.auth-footer {
    text-align: center;
    font-size: 13px;
    color: #64748b;
    margin-top: 16px;
}

</style>

{% endblock %}
