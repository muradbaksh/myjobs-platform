{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<h2>Change Password</h2>

<form method="POST">
    {% csrf_token %}
    <!-- {{ form | crispy}} -->
    {% for fm in form %}
    <div class="mb-3">
        {{ fm.label_tag }}
        {{ fm }}
        <div class="text-danger">
            {{ fm.errors }}
        </div>
    </div>
    {% endfor %}
    <button class="btn btn-danger">Confirm</button>
</form>


<style>

</style>
{% endblock %}
